# Example: multiple subscriptions via proxy-providers.
# The running stack now renders config.yaml from environment variables.
# Keep this file as a reference only.

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true

external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
secret: ""

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    - system

proxies:
  - name: MOCK
    type: http
    server: 127.0.0.1
    port: 65535

proxy-providers:
  sub1:
    type: http
    url: "https://example.com/sub-a"
    path: ./providers/sub1.yaml
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  sub2:
    type: http
    url: "https://example.com/sub-b"
    path: ./providers/sub2.yaml
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  sub3:
    type: http
    url: "https://example.com/sub-c"
    path: ./providers/sub3.yaml
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - FALLBACK
      - 香港
      - 台湾
      - 日本
      - 新加坡
      - 美国
      - MOCK
      - DIRECT
    use:
      - sub1
      - sub2
      - sub3

  - name: 香港
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3
    filter: "香港|HK|Hong Kong|🇭🇰"

  - name: 台湾
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3
    filter: "台湾|台灣|TW|Taiwan|🇹🇼"

  - name: 日本
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3
    filter: "日本|JP|Japan|东京|大阪|🇯🇵"

  - name: 新加坡
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3
    filter: "新加坡|SG|Singapore|狮城|🇸🇬"

  - name: 美国
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3
    filter: "美国|US|USA|United States|美[国國]|洛杉矶|硅谷|西雅图|纽约|🇺🇸"

  - name: AUTO
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - sub1
      - sub2
      - sub3

  - name: FALLBACK
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 300
    use:
      - sub1
      - sub2
      - sub3

rules:
  - MATCH,PROXY